# ============================================================================
#  openedgezbx.conf
#  --------------------------------------------------------------------------
#  Configuração do Zabbix Agent2 para monitoração OpenEdge RDBMS.
#  Copie este arquivo para o diretório de includes do agent2:
#    cp openedgezbx.conf /etc/zabbix/zabbix_agent2.d/
#    systemctl restart zabbix-agent2
#
#  Pré-requisito: no zabbix_agent2.conf principal deve existir:
#    Include=/etc/zabbix/zabbix_agent2.d/*.conf
#
#  IMPORTANTE: AllowKey/DenyKey devem estar em um único local
#  (agent2.conf OU neste arquivo). Se já existirem regras no
#  agent2.conf principal, mova-as para cá ou vice-versa.
# ============================================================================

# --- Permissões de chave ---
# Permite leitura dos JSONs e discovery do diretório do coletor.
# DenyKey obrigatório quando AllowKey é usado (exigência do Agent2).
# A ordem importa: DenyKey system.run bloqueia execução de comandos,
# AllowKey libera apenas as chaves necessárias para o openedgezbx.
DenyKey=system.run[*]
AllowKey=vfs.file.contents[/openedgezbx/json_zbx/*]
AllowKey=vfs.dir.get[/openedgezbx/json_zbx,*]
