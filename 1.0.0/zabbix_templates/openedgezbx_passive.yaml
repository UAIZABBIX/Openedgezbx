          # ==================================================================
          # TRIGGER PROTOTYPES
          # ==================================================================
          trigger_prototypes:
            - uuid: 7d0404d4c8b3466287c98040b205a67d
              expression: 'last(/openedgezbx/ozbx.io.buffer_hit_ratio[{#BASENAME}])<{$OZBX_BUFFER_HIT_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Buffer hit ratio CRITICAL (<{$OZBX_BUFFER_HIT_CRIT}%)'
              priority: HIGH
              description: 'Buffer hit ratio abaixo do limiar crítico. Indica insuficiência de buffers (-B).'
              tags:
                - tag: scope
                  value: performance

            - uuid: 503d4c46f2cb4640b5af798753e2f770
              expression: 'last(/openedgezbx/ozbx.io.buffer_hit_ratio[{#BASENAME}])<{$OZBX_BUFFER_HIT_WARN} and last(/openedgezbx/ozbx.io.buffer_hit_ratio[{#BASENAME}])>={$OZBX_BUFFER_HIT_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Buffer hit ratio WARNING (<{$OZBX_BUFFER_HIT_WARN}%)'
              priority: WARNING
              description: 'Buffer hit ratio abaixo do limiar de atenção.'
              tags:
                - tag: scope
                  value: performance

            - uuid: c4035044c9754dcd9d8b400a21231778
              expression: 'last(/openedgezbx/ozbx.trx.long[{#BASENAME}])>={$OZBX_LONG_TRANS_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Long transactions CRITICAL (>={$OZBX_LONG_TRANS_CRIT})'
              priority: HIGH
              description: 'Transações ativas com duração >60s acima do limiar crítico.'
              tags:
                - tag: scope
                  value: performance

            - uuid: c07eb0eeb51c48b78fb687dc0f43ed6b
              expression: 'last(/openedgezbx/ozbx.trx.long[{#BASENAME}])>={$OZBX_LONG_TRANS_WARN} and last(/openedgezbx/ozbx.trx.long[{#BASENAME}])<{$OZBX_LONG_TRANS_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Long transactions WARNING (>={$OZBX_LONG_TRANS_WARN})'
              priority: WARNING
              tags:
                - tag: scope
                  value: performance

            - uuid: fcdb6449da73481186cfc5d42f303b7b
              expression: 'last(/openedgezbx/ozbx.lock.waits_per_sec[{#BASENAME}])>{$OZBX_LOCK_WAITS_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Lock waits/sec CRITICAL (>{$OZBX_LOCK_WAITS_CRIT})'
              priority: HIGH
              description: 'Lock waits por segundo acima do limiar crítico. Indica contenção severa.'
              tags:
                - tag: scope
                  value: performance

            - uuid: 695ae65746274488a7c9be4b45ba6b00
