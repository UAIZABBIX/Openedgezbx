            - uuid: 7331b8ffb4e144bbafc18f374d09a465
              name: 'OpenEdge [{#BASENAME}]: Uptime (seconds)'
              type: DEPENDENT
              key: 'ozbx.db.uptime[{#BASENAME}]'
              value_type: FLOAT
              units: s
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.database.uptime_seconds'
              tags:
                - tag: component
                  value: database

            - uuid: f54b7c8bc0c145528590fe044bf2adce
              name: 'OpenEdge [{#BASENAME}]: Collector Status'
              type: DEPENDENT
