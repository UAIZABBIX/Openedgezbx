              priority: DISASTER
              description: 'O banco de dados não está respondendo.'
              tags:
                - tag: scope
                  value: availability

            - uuid: 0cd87db8e97a43459447df82600b3d58
              expression: 'last(/openedgezbx/ozbx.io.reads_per_sec[{#BASENAME}])>{$OZBX_READS_SEC_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Physical reads/sec CRITICAL (>{$OZBX_READS_SEC_CRIT})'
              priority: HIGH
              tags:
                - tag: scope
                  value: performance

