              name: 'OpenEdge [{#BASENAME}]: -L abaixo do recomendado (<{$OZBX_STARTUP_L_MIN})'
              priority: WARNING
              description: 'Tamanho da lock table (-L) abaixo do recomendado. Pode causar lock table overflow em ambientes de alta carga.'
