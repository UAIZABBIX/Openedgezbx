            - uuid: 95c99aeae6d646259818e30599061276
              name: 'OpenEdge [{#BASENAME}]: Lock Table Current'
              type: DEPENDENT
              key: 'ozbx.mem.lock_table[{#BASENAME}]'
              value_type: UNSIGNED
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.metrics.memory.lock_table_current'
