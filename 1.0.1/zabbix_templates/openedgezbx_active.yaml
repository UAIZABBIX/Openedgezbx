            # ================================================================
            - uuid: bae623d7c5b6494bb680ae37022a1dd2
              name: 'OpenEdge [{#BASENAME}]: DB Create Date'
              type: DEPENDENT
              key: 'ozbx.cfg.create_date[{#BASENAME}]'
              value_type: CHAR
              master_item:
