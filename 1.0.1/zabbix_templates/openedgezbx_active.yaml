          # ==================================================================
          # LLD MACROS — mapeamento dos campos retornados pelo vfs.dir.get
          # ==================================================================
          lld_macro_paths:
            - lld_macro: '{#PATHNAME}'
              path: '$.pathname'
            - lld_macro: '{#BASENAME}'
              path: '$.basename'

          # ==================================================================
          # TRIGGER PROTOTYPES
          # ==================================================================
          trigger_prototypes:
            - uuid: 3d1fa51086444e8b90baab2477bcd557
              expression: 'last(/openedgezbx_active/ozbx.io.buffer_hit_ratio[{#BASENAME}])<{$OZBX_BUFFER_HIT_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Buffer hit ratio CRITICAL (<{$OZBX_BUFFER_HIT_CRIT}%)'
              priority: HIGH
              description: 'Buffer hit ratio abaixo do limiar crítico. Indica insuficiência de buffers (-B).'
              tags:
                - tag: scope
                  value: performance

            - uuid: 01b9e9a0800045b598df077287b46b68
              expression: 'last(/openedgezbx_active/ozbx.io.buffer_hit_ratio[{#BASENAME}])<{$OZBX_BUFFER_HIT_WARN} and last(/openedgezbx_active/ozbx.io.buffer_hit_ratio[{#BASENAME}])>={$OZBX_BUFFER_HIT_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Buffer hit ratio WARNING (<{$OZBX_BUFFER_HIT_WARN}%)'
              priority: WARNING
              description: 'Buffer hit ratio abaixo do limiar de atenção.'
              tags:
                - tag: scope
                  value: performance

            - uuid: da3088da8cc5478e899609a5cf3c9c7a
              expression: 'last(/openedgezbx_active/ozbx.trx.long[{#BASENAME}])>={$OZBX_LONG_TRANS_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Long transactions CRITICAL (>={$OZBX_LONG_TRANS_CRIT})'
              priority: HIGH
              description: 'Transações ativas com duração >60s acima do limiar crítico.'
              tags:
                - tag: scope
                  value: performance

            - uuid: dd262c977fd64c95a503f7ead4fdd92d
              expression: 'last(/openedgezbx_active/ozbx.trx.long[{#BASENAME}])>={$OZBX_LONG_TRANS_WARN} and last(/openedgezbx_active/ozbx.trx.long[{#BASENAME}])<{$OZBX_LONG_TRANS_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Long transactions WARNING (>={$OZBX_LONG_TRANS_WARN})'
              priority: WARNING
              tags:
                - tag: scope
                  value: performance

            - uuid: e5fca55d172f4d6aa2593967d1c452e8
              expression: 'last(/openedgezbx_active/ozbx.lock.waits_per_sec[{#BASENAME}])>{$OZBX_LOCK_WAITS_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Lock waits/sec CRITICAL (>{$OZBX_LOCK_WAITS_CRIT})'
              priority: HIGH
              description: 'Lock waits por segundo acima do limiar crítico. Indica contenção severa.'
              tags:
                - tag: scope
                  value: performance

            - uuid: f0d72392b02048d2a35cbb9872604b79
              expression: 'last(/openedgezbx_active/ozbx.lock.waits_per_sec[{#BASENAME}])>{$OZBX_LOCK_WAITS_WARN} and last(/openedgezbx_active/ozbx.lock.waits_per_sec[{#BASENAME}])<={$OZBX_LOCK_WAITS_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Lock waits/sec WARNING (>{$OZBX_LOCK_WAITS_WARN})'
              priority: WARNING
              tags:
                - tag: scope
                  value: performance

