              name: 'OpenEdge [{#BASENAME}]: Database OFFLINE'
              priority: DISASTER
              description: 'O banco de dados não está respondendo.'
              tags:
                - tag: scope
                  value: availability

            - uuid: d55f64158d0a4ac0a2d4f200acaf0e69
              expression: 'last(/openedgezbx_active/ozbx.io.reads_per_sec[{#BASENAME}])>{$OZBX_READS_SEC_CRIT}'
              name: 'OpenEdge [{#BASENAME}]: Physical reads/sec CRITICAL (>{$OZBX_READS_SEC_CRIT})'
              priority: HIGH
              tags:
                - tag: scope
                  value: performance

