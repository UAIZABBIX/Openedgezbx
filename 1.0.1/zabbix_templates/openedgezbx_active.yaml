                    - '$.metrics.io.db_writes_total'
              tags:
                - tag: component
                  value: io

            - uuid: ed3c10786a7845988e9ecd564bc164e2
              name: 'OpenEdge [{#BASENAME}]: Areas Count'
              type: DEPENDENT
              key: 'ozbx.io.areas_count[{#BASENAME}]'
              value_type: UNSIGNED
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.metrics.io.areas_count'
              tags:
                - tag: component
                  value: io

            # ================================================================
            # MEMÓRIA E BUFFERS
            # ================================================================
            - uuid: b0ca060f2b62468bb5a88a618640be85
              name: 'OpenEdge [{#BASENAME}]: LRU Scans/sec'
              type: DEPENDENT
              key: 'ozbx.mem.lru_scans[{#BASENAME}]'
              value_type: FLOAT
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
