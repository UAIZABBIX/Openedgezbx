              name: 'OpenEdge [{#BASENAME}]: -spin abaixo do recomendado (<{$OZBX_STARTUP_SPIN_MIN})'
              priority: INFO
              description: 'Valor de -spin abaixo do recomendado. Em servidores multi-core o ideal e ajustar para reduzir latch waits.'
