zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 5e7690578f4b4119ace2c83554a813ad
      name: openedgezbx

  templates:
    - uuid: 0a44cf683eab4f3a83e8ecabfece0d07
      template: openedgezbx_active
      name: 'OpenEdge RDBMS - Active'
      description: |
        Template de monitoração ativa para bancos Progress OpenEdge RDBMS.
        Autodiscovery de bancos via arquivos JSON gerados pelo openedgezbx_collector.sh.
        Compatível com Zabbix Agent2 modo ativo.
      groups:
        - name: openedgezbx

      macros:
        - macro: '{$OZBX_JSON_DIR}'
          value: '/openedgezbx/json_zbx'
          description: 'Diretório onde os JSONs de coleta são salvos'
        - macro: '{$OZBX_BUFFER_HIT_WARN}'
          value: '95'
          description: 'Buffer hit ratio - limiar warning (%)'
        - macro: '{$OZBX_BUFFER_HIT_CRIT}'
          value: '90'
          description: 'Buffer hit ratio - limiar critical (%)'
        - macro: '{$OZBX_LONG_TRANS_WARN}'
          value: '1'
          description: 'Transações longas (>60s) - limiar warning'
        - macro: '{$OZBX_LONG_TRANS_CRIT}'
          value: '3'
          description: 'Transações longas (>60s) - limiar critical'
        - macro: '{$OZBX_LOCK_WAITS_WARN}'
          value: '1'
          description: 'Lock waits/sec - limiar warning'
        - macro: '{$OZBX_LOCK_WAITS_CRIT}'
          value: '10'
          description: 'Lock waits/sec - limiar critical'
        - macro: '{$OZBX_CONN_PCT_WARN}'
          value: '80'
          description: 'Conexões ativas vs max (%) - limiar warning'
        - macro: '{$OZBX_CONN_PCT_CRIT}'
          value: '95'
          description: 'Conexões ativas vs max (%) - limiar critical'
        - macro: '{$OZBX_STARTUP_B_MIN}'
          value: '5000'
          description: 'Tamanho minimo recomendado para -B (buffers)'
        - macro: '{$OZBX_STARTUP_L_MIN}'
          value: '8192'
          description: 'Tamanho minimo recomendado para -L (lock table)'
        - macro: '{$OZBX_STARTUP_SPIN_MIN}'
          value: '5000'
          description: 'Valor minimo recomendado para -spin'
        - macro: '{$OZBX_READS_SEC_WARN}'
          value: '50'
          description: 'Physical reads/sec - limiar warning'
        - macro: '{$OZBX_READS_SEC_CRIT}'
          value: '200'
          description: 'Physical reads/sec - limiar critical'
        - macro: '{$OZBX_CONSUMED_HWM_WARN}'
          value: '90'
          description: '% consumido até HWM - warning'
        - macro: '{$OZBX_CONSUMED_HWM_CRIT}'
          value: '95'
          description: '% consumido até HWM - critical'
        - macro: '{$OZBX_FREE_REUSE_WARN}'
          value: '10'
          description: '% livre reutilizável - warning (abaixo é ruim)'
        - macro: '{$OZBX_FREE_REUSE_CRIT}'
          value: '5'
          description: '% livre reutilizável - critical (abaixo é ruim)'
        - macro: '{$OZBX_BACKUP_FULL_WARN}'
          value: '1440'
          description: 'Minutos desde full backup - warning (1440=24h)'
        - macro: '{$OZBX_BACKUP_FULL_CRIT}'
          value: '2880'
          description: 'Minutos desde full backup - critical (2880=48h)'
        - macro: '{$OZBX_BACKUP_ANY_WARN}'
          value: '1440'
          description: 'Minutos desde qualquer backup - warning (1440=24h)'
        - macro: '{$OZBX_BACKUP_ANY_CRIT}'
          value: '2880'
          description: 'Minutos desde qualquer backup - critical (2880=48h)'

      discovery_rules:
        - uuid: b6e99b58f8a14a5f99417164472a8f1a
          name: 'OpenEdge: Database Discovery'
          key: 'vfs.dir.get[{$OZBX_JSON_DIR},\.json$]'
          delay: 5m
          lifetime: 7d
          description: 'Descobre automaticamente os arquivos JSON de bancos OpenEdge no diretório de coleta.'
          item_prototypes:

            # ================================================================
            # MASTER ITEM — Lê o conteúdo JSON completo do arquivo
            # Todos os demais itens são DEPENDENT deste.
            # ================================================================
            - uuid: 07d1c63b5d4f49f38fac845beed76b2c
              name: 'OpenEdge [{#BASENAME}]: Raw JSON'
              type: ZABBIX_ACTIVE
              key: 'vfs.file.contents[{#PATHNAME}]'
              delay: 1m
              history: 0d
              trends: 0d
              value_type: TEXT
              description: 'Conteúdo bruto do JSON de métricas do banco. Usado como master item para itens dependentes.'

            # ================================================================
            # IDENTIFICAÇÃO DO BANCO
            # ================================================================
            - uuid: 2dfd6ff8ad6343b58db1c20cc8fe919d
              name: 'OpenEdge [{#BASENAME}]: Logical Name'
              type: DEPENDENT
              key: 'ozbx.db.logical_name[{#BASENAME}]'
              value_type: CHAR
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.database.logical_name'
              tags:
                - tag: component
                  value: database

            - uuid: b54cb6735bda4ea0adade8cbacbbffc8
              name: 'OpenEdge [{#BASENAME}]: Physical Path'
              type: DEPENDENT
              key: 'ozbx.db.physical_path[{#BASENAME}]'
              value_type: CHAR
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.database.physical_path'
              tags:
                - tag: component
                  value: database

            - uuid: f908701cdbde4a4099c773e99e5d6019
              name: 'OpenEdge [{#BASENAME}]: Host'
              type: DEPENDENT
              key: 'ozbx.db.host[{#BASENAME}]'
              value_type: CHAR
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.database.host'
              tags:
                - tag: component
                  value: database

            - uuid: 8cc87b3e202f40b28aa0034cdf6c0bdc
              name: 'OpenEdge [{#BASENAME}]: OpenEdge Version'
              type: DEPENDENT
              key: 'ozbx.db.version[{#BASENAME}]'
              value_type: CHAR
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.database.openedge_version'
              tags:
                - tag: component
                  value: database

            - uuid: d388c772e59f4990b2362c8e41df0ce9
              name: 'OpenEdge [{#BASENAME}]: DB Status'
              type: DEPENDENT
              key: 'ozbx.db.status[{#BASENAME}]'
              value_type: CHAR
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.database.db_status'
              tags:
                - tag: component
                  value: database

            - uuid: ae4e14997ee24d45afe151606b5d165b
              name: 'OpenEdge [{#BASENAME}]: Uptime (seconds)'
              type: DEPENDENT
              key: 'ozbx.db.uptime[{#BASENAME}]'
              value_type: FLOAT
              units: s
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.database.uptime_seconds'
              tags:
                - tag: component
                  value: database

            - uuid: 62fcba3b2ba84b2497db3e73d0481ed5
              name: 'OpenEdge [{#BASENAME}]: Collector Status'
              type: DEPENDENT
              key: 'ozbx.collector.status[{#BASENAME}]'
              value_type: CHAR
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.collector.status'
              tags:
                - tag: component
                  value: collector

            - uuid: 0f187915d1544751a9bcb2ee41315a5b
              name: 'OpenEdge [{#BASENAME}]: Health Status'
              type: DEPENDENT
              key: 'ozbx.summary.health[{#BASENAME}]'
              value_type: CHAR
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.summary.health_status'
              tags:
                - tag: component
                  value: summary

            # ================================================================
            # I/O E ARMAZENAMENTO
            # ================================================================
            - uuid: 479bf37ea8f0449db7726630fe718af7
              name: 'OpenEdge [{#BASENAME}]: Buffer Hit Ratio (%)'
              type: DEPENDENT
              key: 'ozbx.io.buffer_hit_ratio[{#BASENAME}]'
              value_type: FLOAT
              units: '%'
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.metrics.io.buffer_hit_ratio'
              tags:
                - tag: component
                  value: io

            - uuid: aeac6549ed154ebe8596927a47407813
              name: 'OpenEdge [{#BASENAME}]: Physical Reads/sec'
              type: DEPENDENT
