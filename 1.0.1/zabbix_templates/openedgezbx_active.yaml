              expression: 'nodata(/openedgezbx_active/vfs.file.contents[{#PATHNAME}],10m)=1'
              name: 'OpenEdge [{#BASENAME}]: No data for 10 minutes'
              priority: WARNING
              description: 'Arquivo JSON não foi atualizado nos últimos 10 minutos. Verificar coletor.'
              tags:
                - tag: scope
                  value: availability

            # --- Triggers de configuracao (parametros de startup) ---
            - uuid: 8b9b5503f89242b198f126c975b06035
              expression: 'last(/openedgezbx_active/ozbx.cfg.startup_b[{#BASENAME}])>0 and last(/openedgezbx_active/ozbx.cfg.startup_b[{#BASENAME}])<{$OZBX_STARTUP_B_MIN}'
              name: 'OpenEdge [{#BASENAME}]: -B abaixo do recomendado (<{$OZBX_STARTUP_B_MIN})'
              priority: WARNING
              description: 'Numero de buffers (-B) abaixo do recomendado. Considere aumentar para melhorar buffer hit ratio.'
