            - uuid: 0641f76765d845e9a05595b276a3edf9
              name: 'OpenEdge [{#BASENAME}]: Long Transactions (>60s)'
              type: DEPENDENT
              key: 'ozbx.trx.long[{#BASENAME}]'
              value_type: UNSIGNED
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.metrics.transactions.long_transactions_over_60s'
              tags:
                - tag: component
                  value: transactions

            - uuid: dfe705fbe1634679a8a2bd38c246f633
              name: 'OpenEdge [{#BASENAME}]: Longest Transaction (sec)'
              type: DEPENDENT
              key: 'ozbx.trx.longest_age[{#BASENAME}]'
              value_type: UNSIGNED
              units: s
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.metrics.transactions.longest_transaction_age_sec'
              tags:
                - tag: component
                  value: transactions

            - uuid: 52a8dbe8e3e44e57b50f454a78ac3909
              name: 'OpenEdge [{#BASENAME}]: BI Cluster Size (KB)'
              type: DEPENDENT
              key: 'ozbx.trx.bi_cluster[{#BASENAME}]'
              value_type: UNSIGNED
              units: KB
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
