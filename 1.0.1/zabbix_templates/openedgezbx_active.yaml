              value_type: UNSIGNED
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.metrics.io.physical_reads_total'
              tags:
                - tag: component
                  value: io

            - uuid: 7d6612b3ee6041c98016968ef6e838c8
              name: 'OpenEdge [{#BASENAME}]: DB Writes Total'
              type: DEPENDENT
              key: 'ozbx.io.db_writes[{#BASENAME}]'
              value_type: UNSIGNED
              master_item:
                key: 'vfs.file.contents[{#PATHNAME}]'
              preprocessing:
